{% extends "base.html" %}
{% block title %}Register | TechHub{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-8 col-lg-6"><div class="card p-4 p-lg-5"><p class="text-accent fw-semibold mb-1">Browser preview</p><h1 class="h3 mb-4">Create account</h1><form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary w-100" type="submit">Register</button></form><p class="text-center text-muted mt-4 mb-0">Already registered? <a href="{% url 'preview-login' %}">Login</a></p></div></div></div>
{% endblock %}
